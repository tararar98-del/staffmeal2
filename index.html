<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wanaburee Staff Meal System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
.success{
background:#d1e7dd;
color:#0f5132;
padding:12px;
border-radius:10px;
margin-top:15px;
font-weight:600;

}
.logo{
width:240px;
max-width:100%;
display:block;
margin:auto;
margin-bottom:50px;
}

body{
font-family:Poppins;
margin:0;
background:#f4f6f9;
}

/* STAFF CARD */

.card{
background:white;
max-width:420px;
margin:auto;
margin-top:40px;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}


input,select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
margin:8px 0;
}

.meals{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.meal{
background:#f1f1f1;
padding:10px;
border-radius:8px;
}

button{
width:100%;
padding:14px;
background:#198754;
color:white;
border:none;
border-radius:10px;
margin-top:15px;
cursor:pointer;
font-weight:600;
}

/* DASHBOARD */

.dashboard{
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:25px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.box h2{
margin:0;
color:#198754;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#198754;
color:white;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #eee;
text-align:center;
}

/* KITCHEN */

.kitchen{
text-align:center;
padding:40px;
}

.kitchen-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:30px;
}

.kitchen-box{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.kitchen-box h1{
font-size:50px;
margin:0;
color:#198754;
}

</style>

</head>

<body>

<div id="app"></div>

<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("sw.js")
}

let db = JSON.parse(localStorage.getItem("staffmeal")) || []

let menu = JSON.parse(localStorage.getItem("staffmenu")) || {
Morning:"",
Afternoon:"",
Evening:"",
Night:""
}

let mode = location.hash.replace("#","")

if(mode=="admin") {
showLogin()
}
else if(mode=="kitchen") {
showKitchen()
setInterval(showKitchen,5000)
}
else {
showStaff()
}

function saveMenu(){

menu.Morning=document.getElementById("m1").value
menu.Afternoon=document.getElementById("m2").value
menu.Evening=document.getElementById("m3").value
menu.Night=document.getElementById("m4").value

localStorage.setItem("staffmenu",JSON.stringify(menu))

alert("Menu Saved")
location.reload()

}

/* STAFF PAGE */

function showStaff(){

document.getElementById("app").innerHTML=`

<div class="card">
<img src="logo.png" class="logo">

<h2>Khaolak Wanaburee Resort</h2>
<p>Staff Meal Registration</p>

<input id="name" placeholder="Staff Name">

<select id="dept">

<option>Department</option>
<option>ADMIN</option>
<option>AC</option>
<option>FO</option>
<option>HR</option>
<option>EN</option>
<option>HK</option>
<option>MK</option>
<option>FB</option>
<option>GD(คนสวน)</option>
</select>

<div class="meals">

<label class="meal"><input type="checkbox" value="Morning"> Morning (${menu.Morning})</label>
<label class="meal"><input type="checkbox" value="Afternoon"> Afternoon (${menu.Afternoon})</label>
<label class="meal"><input type="checkbox" value="Evening"> Evening (${menu.Evening})</label>
<label class="meal"><input type="checkbox" value="Night"> Night (${menu.Night})</label>

</div>

<button onclick="register()">Register</button>

<p id="msg"></p>

</div>

`

}

function register(){

let name=document.getElementById("name").value
let dept=document.getElementById("dept").value
if(name.trim()==""){
alert("Please enter your name")
return
}
if(dept=="Department"){
alert("Please select department")
return
}

let meals=[...document.querySelectorAll(".meal input:checked")].map(x=>x.value)

if(meals.length==0){
alert("Please select meal")
return
}

if(meals.length>2){
alert("เลือกได้ไม่เกิน 2 มื้อ")
return
}
let duplicate = db.find(x => x.name.toLowerCase() === name.toLowerCase())

if(duplicate){
alert("You already registered")
return
}

db.push({
name,
dept,
meals,
time:new Date().toLocaleString()
})

localStorage.setItem("staffmeal",JSON.stringify(db))

document.getElementById("msg").innerHTML =
"<div class='success'>✔ Registration Successful</div>"

setTimeout(()=>{
document.getElementById("msg").innerHTML=""
},3000)
document.getElementById("name").value=""
document.getElementById("dept").value="Department"
document.querySelectorAll(".meal input").forEach(x=>x.checked=false)
}

/* LOGIN */

function showLogin(){

document.getElementById("app").innerHTML=`

<div class="card">
<h3>Meal Menu Setting</h3>

<input id="m1" placeholder="Morning menu" value="${menu.Morning}">
<input id="m2" placeholder="Afternoon menu" value="${menu.Afternoon}">
<input id="m3" placeholder="Evening menu" value="${menu.Evening}">
<input id="m4" placeholder="Night menu" value="${menu.Night}">

<button onclick="saveMenu()">Save Menu</button>

<br><br>    

<h2>HR Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

`

}

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u=="hr" && p=="wanaburee"){
showDashboard()
}else{
alert("Wrong password")
}

}

/* DASHBOARD */

function showDashboard(){

let data = JSON.parse(localStorage.getItem("staffmeal")) || []

let totalStaff=data.length
let totalMeals=0

let morning=0
let afternoon=0
let evening=0
let night=0

data.forEach(x=>{

totalMeals+=x.meals.length

if(x.meals.includes("Morning")) morning++
if(x.meals.includes("Afternoon")) afternoon++
if(x.meals.includes("Evening")) evening++
if(x.meals.includes("Night")) night++

})

let html=`

<div class="dashboard">

<div class="topbar">

<h2>Wanaburee Staff Meal Dashboard</h2>

<div>
<button onclick="exportExcel()">Export</button>
<button onclick="resetData()">Reset</button>
<button onclick="location.hash='';location.reload()">Staff Page</button>
</div>

</div>

<div class="cards">

<div class="box"><h2>${totalStaff}</h2><p>Staff</p></div>
<div class="box"><h2>${totalMeals}</h2><p>Meals</p></div>
<div class="box"><h2>${new Date().toLocaleDateString()}</h2><p>Date</p></div>

</div>

<table>

<tr>
<th>Name</th>
<th>Dept</th>
<th>Meals</th>
<th>Time</th>
</tr>

`

data.forEach(x=>{

html+=`

<tr>
<td>${x.name}</td>
<td>${x.dept}</td>
<td>${x.meals.join(", ")}</td>
<td>${x.time}</td>
</tr>

`

})

html+=`</table></div>`

document.getElementById("app").innerHTML=html

}

/* KITCHEN SCREEN */

function showKitchen(){

let data = JSON.parse(localStorage.getItem("staffmeal")) || []

let m=0,a=0,e=0,ni=0

data.forEach(x=>{
if(x.meals.includes("Morning")) m++
if(x.meals.includes("Afternoon")) a++
if(x.meals.includes("Evening")) e++
if(x.meals.includes("Night")) ni++
})

document.getElementById("app").innerHTML=`

<div class="kitchen">

<h1>Kitchen Meal Count</h1>

<div class="kitchen-grid">

<div class="kitchen-box">

    <h1>${m}</h1>
<p>Morning<br>${menu.Morning}</p>
</div>

<div class="kitchen-box">
<h1>${a}</h1>
<p>Afternoon<br>${menu.Afternoon}</p>
</div>

<div class="kitchen-box">
<h1>${e}</h1>
<p>Evening<br>${menu.Evening}</p>
</div>

<div class="kitchen-box">
<h1>${ni}</h1>
<p>Night<br>${menu.Night}</p>
</div>

</div>
</div>

`

}
/* EXPORT */

function exportExcel(){

let data = JSON.parse(localStorage.getItem("staffmeal")) || []

let csv="Name,Dept,Meals,Time\n"

data.forEach(x=>{
csv+=`${x.name},${x.dept},"${x.meals.join(" ")}",${x.time}\n`
})

let blob=new Blob([csv])
let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="staffmeal.csv"
a.click()

}

/* RESET */

function resetData(){

if(confirm("Delete all data?")){
localStorage.removeItem("staffmeal")
location.reload()
}

}

</script>


</body>
</html>
